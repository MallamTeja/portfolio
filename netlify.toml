[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "18.18.0"

# Note: Using Next.js static export (output: 'export').
# Do not use the Next.js Netlify plugin; it is for SSR.

[dev]
  command = "npm run dev"
  port = 3000
  publish = "out"
  targetPort = 3000
